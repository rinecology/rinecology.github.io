# Forest Unit (SFU) Classification Rules
# Northeast Region (NER) - Boreal TN021 (Original)
# Source: NESI Technical Note TN-021
# Reference: Parton, J., S Vasiliauskas, G. Lucking, and W. R. Watt. 2006.
#   Standard Forest Units for Northeastern Ontario Boreal Forests.
#   OMNR, Northeast Science and Information Unit, NESI Technical Note TN-021. 23 p.

name: "NER Boreal SFU TN021"
description: "Standard Forest Units for NE Ontario Boreal (Original TN-021)"
region: "NER"
version: "TN021"

rules:
  1:
    sfu: "PR1"
    rule: '("Pr" >= 70)'
    description: "Red pine, plantations"
  2:
    sfu: "PW1"
    rule: '("Pw" + "Pr" + "Sw" + "He" >= 40 && "Pw" >= 30)'
    description: "White pine, shelterwood"
  3:
    sfu: "PRW"
    rule: '("Pw" + "Pr" >= 40)'
    description: "Red and white pine"
  4:
    sfu: "LH1"
    rule: '(("Ab" + "Ew" + "Pb") >= 30 || "Pb" >= 30)'
    description: "Lowland Hardwood"
  5:
    sfu: "TH1"
    rule: '(("Ab" + "Ew" + "Pb") + "Mh" + ("_By" + "Mr") + "He" >= 30)'
    description: "Tolerant Hardwoods"
  6:
    sfu: "SBOG"
    rule: '(("Sb" + "La") >= 70 && "Pw" == 0 && "OSC" == 4)'
    description: "Black spruce, bog"
  7:
    sfu: "SB1"
    rule: '(("Sb" >= 80) && "Mh" + ("_By" + "Mr") + "Pr" == 0 && "Pw" + "Pj" <= 10)'
    description: "Black spruce, lowland"
  8:
    sfu: "PJ1"
    rule: '(("Pj" >= 70 && "Po" + "Bw" + ("_By" + "Mr") + "Mh" + ("Ab" + "Ew" + "Pb") <= 20) || ("Pj" >= 50 && ("Pj" + "Sb" + "Bf" + "Sw" + "He" + "Pw" + "Pr" + "Ce" + "La" >= 70) && "Age" >= 120))'
    description: "Jack pine, pure"
  9:
    sfu: "LC1"
    rule: '(("Sb" + "Ce" + "La" >= 80) && "Mh" + ("_By" + "Mr") + "Pr" == 0 && "Pw" + "Pj" <= 10)'
    description: "Lowland conifer"
  10:
    sfu: "PJ2"
    rule: '(("Pj" + "Sb" + "Pr" >= 70 || ("Pj" + "Pr" + "Pw" >= 50 && "Pj" + "Sb" + "Bf" + "Sw" + "He" + "Pw" + "Pr" + "Ce" + "La" >= 70)) && "Pj" + "Pr" + "Pw" >= "Sb")'
    description: "Jack pine black spruce"
  11:
    sfu: "SP1"
    rule: '("Sb" + "Sw" + "Bf" + "Ce" + "La" + "Pw" + "Pj" + "Pr" + "He" >= 70 && ("Bf" + "Ce" + "Sw" + "He" <= 20 || "Pj" + "Pr" >= 30))'
    description: "Spruce, upland"
  12:
    sfu: "SF1"
    rule: '("Sb" + "Sw" + "Bf" + "Ce" + "La" + "Pw" + "Pj" + "Pr" + "He" >= 70)'
    description: "Spruce Fir"
  13:
    sfu: "PO1"
    rule: '("Po" + "Bw" + "Mh" + ("_By" + "Mr") + ("Ab" + "Ew" + "Pb") >= 70 && "Po" >= 50)'
    description: "Poplar"
  14:
    sfu: "BW1"
    rule: '("Po" + "Bw" + "Mh" + ("_By" + "Mr") + ("Ab" + "Ew" + "Pb") >= 70)'
    description: "White birch"
  15:
    sfu: "MW1"
    rule: '("Pj" + "Pr" >= 20)'
    description: "Mixedwood"
  16:
    sfu: "MW2"
    rule: "(true)"
    description: "Mixedwood - default for forest"
