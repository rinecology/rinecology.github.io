# Forest Unit (SFU) Classification Rules
# NER Boreal Revised SFU 2019 v9 (ROD2023)

name: "NER Boreal v9 ROD2023"
description: "NER Boreal Revised SFU 2019 v9"
region: "NER"
version: "v9_ROD2023"

rules:
  1:
    sfu: "PR1"
    rule: '("Pr" >= 70)'
    description: "Red pine, plantations"
  2:
    sfu: "PW1"
    rule: '("Pw" + "Pr" + "He" + ("Sw" + "Sx") >= 40 && "Pw" >= 30)'
    description: "White pine, shelterwood"
  3:
    sfu: "PRW"
    rule: '(("Pw" + "Pr" + "He" + ("Sw" + "Sx") >= 40) && ("Pw" + "Pr" >= 30))'
    description: "Red and white pine"
  4:
    sfu: "LH1"
    rule: '("Ab" + "Ew" + "_By" >= 20 || "Pb" >= 70)'
    description: "Lowland Hardwood"
  5:
    sfu: "TH1"
    rule: '(("Ab" + "Ew") + "Mh" + ("_By" + "Mr") + "He" >= 30)'
    description: "Tolerant Hardwoods"
  6:
    sfu: "SBOG"
    rule: '(("Sb" + "La" + ("Ce" + "Cw") >= 70) && "OSC" == 4)'
    description: "Black spruce, bog"
  7:
    sfu: "SB1"
    rule: '(("Sb" >= 80) && ("Ab" <= 10))'
    description: "Black spruce, lowland"
  8:
    sfu: "PJ1"
    rule: '((("Pj" >= 70) && (("Po" + "Pt") + "Bw" + ("_By" + "Mr") + "Mh" + ("Ab" + "Ew" + "Pb") <= 20)) || ("Pj" >= 90))'
    description: "Jack pine, pure"
  9:
    sfu: "LC1"
    rule: '((("Ce" + "Cw") + "La" + "Sb" + "Bf" + "Sw" >= 70))'
    description: "Lowland conifer"
  10:
    sfu: "PJ2"
    rule: '((("Pj" + "Sb" + "Pr" + "Pw" >= 70) || ("Pj" >= 30 && "Pj" + "Sb" + "Bf" + ("Sw" + "Sx") + "Pw" + "Pr" + ("Ce" + "Cw") + "La" >= 70)) && (("Pj" + "Pw" + "Pr") >= ("Sb" + ("Sw" + "Sx") + ("Ce" + "Cw"))))'
    description: "Jack pine black spruce"
  11:
    sfu: "SP1"
    rule: '(("Sb" + ("Sw" + "Sx") + "Bf" + ("Ce" + "Cw") + "La" + "Pw" + "Pj" + "Pr" + "He" >= 70) && (("Bf" + ("Ce" + "Cw") + "Pw" + ("Sw" + "Sx") + "He" <= 20) || ("Pj" + "Pr" + "La" >= 30)))'
    description: "Spruce, upland"
  12:
    sfu: "SF1"
    rule: '("Sb" + ("Sw" + "Sx") + "Bf" + ("Ce" + "Cw") + "La" + "Pw" + "Pj" + "Pr" >= 70)'
    description: "Spruce Fir"
  13:
    sfu: "PO1"
    rule: '((("Po" + "Pt" + "Pl") + "Bw" + "Mh" + ("_By" + "Mr") + ("Ab" + "Ew" + "Pb") >= 70) && (("Po" + "Pt" + "Pl" + "Pb") >= 50))'
    description: "Poplar"
  14:
    sfu: "BW1"
    rule: '(("Po" + "Pt" + "Pl") + "Bw" + "Mh" + ("_By" + "Mr") + ("Ab" + "Ew" + "Pb") >= 70)'
    description: "White birch"
  15:
    sfu: "MH1"
    rule: '(((("Bf" <= 20 && ("Sw" + "Sx") <= 20 && ("Ce" + "Cw") <= 20) && ("Po" + "Pt" + "Pl") + "Bw" + "Mh" + ("_By" + "Mr") + ("Ab" + "Ew" + "Pb") >= 50) && ("Pj" + "Pr" <= 50 && "Pj" + "Pr" >= 20)))'
    description: "Mixedwood hardwood fresh coarse"
  16:
    sfu: "MC1"
    rule: '((("Bf" <= 20 && ("Sw" + "Sx") <= 20 && ("Ce" + "Cw") <= 20 && ("Pj" + "Pr" + "La") >= 20)) || ("Pj" + "Pr" >= 50))'
    description: "Mixedwood conifer fresh coarse"
  17:
    sfu: "MH2"
    rule: '(("Po" + "Pt" + "Pl") + "Bw" + "Mh" + ("_By" + "Mr") + ("Ab" + "Ew" + "Pb") >= 50)'
    description: "Mixedwood hardwood moist fine"
  18:
    sfu: "MC2"
    rule: '("Sb" + ("Sw" + "Sx") + "Bf" + ("Ce" + "Cw") + "La" + "Pw" + "Pj" + "Pr" > 50)'
    description: "Mixedwood conifer moist fine"
  19:
    sfu: "UDF"
    rule: '("POLYTYPE" == "FOR")'
    description: "Undefined"
